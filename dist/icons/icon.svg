  <line x1="28" y1="68" x2="44" y2="70" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="76" x2="44" y2="75" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="70" x2="100" y2="68" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="75" x2="100" y2="76" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- API badge -->
  <rect x="44" y="88" width="40" height="18" rx="9" fill="#333" opacity="0.85"/>
  <text x="64" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#49cc90">API</text>
