<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4a0"/>
      <stop offset="100%" style="stop-color:#17a673"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Cute cat ears -->
  <polygon points="30,38 42,12 56,34" fill="#fff" opacity="0.9"/>
  <polygon points="72,34 86,12 98,38" fill="#fff" opacity="0.9"/>
  <polygon points="35,36 42,18 52,34" fill="#ffccdd" opacity="0.7"/>
  <polygon points="76,34 86,18 93,36" fill="#ffccdd" opacity="0.7"/>
  <!-- Face circle -->
  <circle cx="64" cy="68" r="38" fill="#fff" opacity="0.92"/>
  <!-- Eyes -->
  <ellipse cx="50" cy="62" rx="5" ry="6" fill="#333"/>
  <ellipse cx="78" cy="62" rx="5" ry="6" fill="#333"/>
  <!-- Eye sparkles -->
  <circle cx="48" cy="59" r="2" fill="#fff"/>
  <circle cx="76" cy="59" r="2" fill="#fff"/>
