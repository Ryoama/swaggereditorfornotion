<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swagger Preview</title>
  <link rel="stylesheet" href="../libs/swagger-ui.css">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="search-bar" style="display: none;">
    <div class="search-container">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search API endpoints..." autocomplete="off" spellcheck="false" />
      <span id="search-count" class="search-count"></span>
      <button id="search-clear" class="search-clear" title="Clear search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="loading">
    <div class="loading-spinner"></div>
    <p>Waiting for OpenAPI spec...</p>
  </div>
  <div id="error" style="display: none;"></div>
  <div id="swagger-ui"></div>
  <script src="../libs/js-yaml.min.js"></script>
  <script src="../libs/swagger-ui-bundle.js"></script>
  <script src="panel.js"></script>
</body>
</html>
